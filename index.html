          document.getElementById('loginOverlay').style.display = 'none';

  // Διαβάζουμε και τις δύο ημερομηνίες
  const start = document.getElementById('singleDate').value;
  const end = document.getElementById('endDate').value || start; 
  
  google.script.run.withSuccessHandler(res => {
    document.getElementById('kR').style.display = 'none';
    
    // Προσθήκη νέων δεδομένων στα υπάρχοντα (rawData) χωρίς διπλότυπα
    const existingIds = new Set(rawData.map(t => t.id));
    res.forEach(newT => { 
      if (!existingIds.has(newT.id)) rawData.push(newT); 
    });
    
    applyGlobal();
    document.getElementById('previewArea').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }).generateQuickReport(authUser, authPass, start, end); // Στέλνουμε start και end
}


function applyGlobal() {

    console.error("rawData is empty or undefined!");
    return;
  }

  // 1. ΦΙΛΤΡΑ & ΔΕΔΟΜΕΝΑ
  const gMode = lastGMode || 'list';
  const sMode = (document.querySelector('input[name="sM"]:checked') || {value:'new'}).value;
  const checkboxes = document.querySelectorAll('.cf:checked');
  const filters = Array.from(checkboxes).map(c => c.value);

  data.sort((a,b) => sMode === 'new' ? b.lastUpdate - a.lastUpdate : a.lastUpdate - b.lastUpdate);

  const totalMailsSum = data.reduce((acc, t) => acc + (t.messages ? t.messages.length : 0), 0);

  // 2. ΧΤΙΣΙΜΟ ΤΟΥ ΣΚΕΛΕΤΟΥ (Layout Surgery)
  document.getElementById('previewArea').innerHTML = `

      <div class="resizer" id="dragMe"></div>

      <div class="ai-sidebar">
        <div id="global-ai-content" style="flex:1; overflow-y:auto; padding:0; scrollbar-width: thin; display: flex; flex-direction: column;">
           <div style="text-align:center; color:#888; margin-top:50px; padding:20px;">
             <h3>🤖 AI Workspace</h3>
             <p>Επιλέξτε μια συνομιλία για ανάλυση.</p>
           </div>
        </div>

        <div class="card" style="margin:0; border:none; border-top:1px solid var(--border); padding:15px; flex-shrink:0; background:white;">
          <div style="display:flex; gap:8px;">
            <input type="text" id="global-ai-input" 
                   style="flex:1; padding:12px; border-radius:8px; border:1px solid #ccc; box-sizing:border-box;" 
                   placeholder="Συζήτηση για ανάλυση ή tasks..."
                   onkeypress="if(event.key === 'Enter') runGlobalAI('summary')">
            <button class="btn-action" 
                    style="background:var(--primary); color:white; width:45px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:18px;" 
                    onclick="runGlobalAI('summary')">➔</button>

        </div>
      </div>

  let emailsHtml = "";

    emailsHtml = `<div style="padding:20px; color:red;">⚠️ Δεν βρέθηκαν mails.</div>`;
  } else {
    if(gMode === 'list') {
      emailsHtml += `<div class="grid-row list-header" style="position:sticky; top:0; z-index:100;"><div>#</div><div>🏢 Πελάτης</div><div>👤 Consultant</div><div>🕒 Ημερομηνία</div><div style="text-align:center;">#Mails (${totalMailsSum})</div><div>📝 Θέμα</div></div>`;
      data.forEach(t => { try { emailsHtml += renderThread(t); } catch(e) {} });
    } else {
      let groups = {};
      data.forEach(t => { const k = (gMode === 'cons') ? t.consultant : t.client; if(!groups[k]) groups[k] = []; groups[k].push(t); });
      Object.keys(groups).sort().forEach(k => {

function renderMessageList(t) {
  if (!t.messages || t.messages.length === 0) return "Δεν βρέθηκαν μηνύματα.";
  
  const total = t.messages.length;
  let indexedMsgs = t.messages.map((m, i) => ({ ...m, seq: i + 1 }));
  if (t.msgSortOrder === 'desc') indexedMsgs.reverse();
  
  // ΕΔΩ ΔΕΝ ΥΠΑΡΧΕΙ ΠΛΕΟΝ REFRESH - ΜΟΝΟ ΣΧΕΔΙΑΣΜΟΣ HTML
  return indexedMsgs.map(m => {
    const isLast = (m.seq === total);
    return `
    <div class="msg-full" ${isLast ? 'style="border-left: 4px solid #2e7d32;"' : ''}>
      <div class="msg-header" oncontextmenu="showMenu(event, 'mail', '${m.id}')" style="${isLast ? 'background: #f1f8e9;' : ''}">
        <div style="display:flex; align-items:center;">
          ${isLast ? '<span style="color:#2e7d32; margin-right:6px; font-size:16px;">●</span>' : ''}
          <b>${m.from}</b> 
          <small style="margin-left:10px; color:#555;">${formatDate(m.timestamp)}</small>
        </div>
        <button class="btn-action" style="margin-left:auto;" onclick="loadFull(this, '${m.id}')">Load Full Mail</button>
      </div>
      <div id="grid-${m.id}" style="padding:10px; background:#fff; border-bottom:1px solid #eee;"></div>
      <div class="m-body" style="padding:15px; background:rgba(0,0,0,0.02); overflow-x:auto;">${m.body}</div>
      <div class="full-mail-view" style="display:none;"></div>
    </div>`;
  }).join('');
}

function toggleMsgSort(tid) {
  const thread = rawData.find(t => t.id === tid);
  thread.msgSortOrder = (thread.msgSortOrder === 'desc') ? 'asc' : 'desc';
  document.getElementById(`sort-btn-${tid}`).innerText = (thread.msgSortOrder === 'desc') ? '🔄 Πατήστε για 1ο -> Τελευταίο' : '🔄 Πατήστε για Τελευταίο-> 1ο';
  document.getElementById(`msg-list-${tid}`).innerHTML = renderMessageList(thread);
}

function generateTaskSummaryTable(entries) {
// Ορισμός της συνάρτησης που μετατρέπει τα ακατέργαστα entries του AI σε πίνακα σύνοψης.

  const statusMap = {
    1: "ΑΝΑΜΟΝΗ ΑΝΑΘΕΣΗΣ", 2: "ΕΝΑΡΞΗ/ΑΝΑΘΕΣΗ", 3: "ΕΚΚΡ. ΠΕΛΑΤΗ", 
    4: "ΕΚΚΡ. DATALINK", 5: "ΟΛΟΚΛΗΡΩΣΗ", 6: "ΑΠΟΚΡΙΣΗ", 
    7: "ΥΠΟΣΤΗΡΙΞΗ (Χρεώσιμη)", 8: "ΥΠΟΣΤΗΡΙΞΗ (Δωρεάν)", 9: "ΑΡΣΗ ΕΚΚΡΕΜΟΤΗΤΑΣ", 
    10: "ΜΕΛΛΟΝΤΙΚΟ", 11: "ΕΝΗΜΕΡΩΣΗ", 12: "TICKET SOFT1", 13: "ΑΚΥΡΩΣΗ"
  };
  // Αντιστοίχιση των αριθμητικών IDs των Status με τα επίσημα λεκτικά της εφαρμογής.

  let summary = {};
  // Δημιουργία αντικειμένου για την ομαδοποίηση των tasks ανά όνομα.

  entries.forEach(e => {
  // Για κάθε entry που παρήγαγε το AI:

    let tName = e.task_name || "Άγνωστο Task";
    // Λήψη του ονόματος του task. Αν δεν υπάρχει, ονομάζεται "Άγνωστο".

    if (!summary[tName]) {
      summary[tName] = { count: 0, lastStatusId: e.status_id };
    }
    // Αν το task εμφανίζεται για πρώτη φορά, φτιάξε μια νέα εγγραφή στο summary.

    let indices = Array.isArray(e.msg_index) ? e.msg_index : [e.msg_index];
    summary[tName].count += indices.length;
    // Πρόσθεσε τον αριθμό των μηνυμάτων που αφορά αυτό το συγκεκριμένο task.

    summary[tName].lastStatusId = Array.isArray(e.status_id) ? e.status_id[0] : e.status_id;
    // Ενημέρωσε το Status ID με την τελευταία τιμή που βρέθηκε (για να φαίνεται η πιο πρόσφατη κατάσταση).
  });

  let html = `
    <div style="margin-top:15px; border:1px solid var(--border); border-radius:8px; overflow:hidden;">
      <div style="background:var(--primary); color:white; padding:8px 12px; font-weight:bold; font-size:13px;">📊 Σύνοψη Tasks</div>
      <table style="width:100%; border-collapse:collapse; font-size:12px; text-align:left;">
        <tr style="background:#f5f5f5; border-bottom:1px solid #ddd;">
          <th style="padding:8px; width:60%;">Εργασία (Task)</th>
          <th style="padding:8px; text-align:center; width:15%;"># Mails</th>
          <th style="padding:8px; width:25%;">Τελευταίο Status</th>
        </tr>`;
  // Κατασκευή του σκελετού του πίνακα με σταθερά πλάτη στηλών (60/15/25).

  for (let task in summary) {
  // Για κάθε ομαδοποιημένο task στο summary:

    let sId = summary[task].lastStatusId;
    let sName = statusMap[sId] || `Status ${sId}`;
    let statusColor = (sId == 5) ? '#2e7d32' : (sId == 3 ? '#d32f2f' : (sId == 4 ? '#f39c12' : '#555'));
    // Επιλογή χρώματος (Πράσινο/Κόκκινο/Πορτοκαλί) ανάλογα με το Status ID.

    html += `
        <tr style="border-bottom:1px solid #eee; background:#fff;">
          <td style="padding:8px; font-weight:500; color:#333;">${task}</td>
          <td style="padding:8px; text-align:center; font-weight:bold; color:var(--primary);">${summary[task].count}</td>
          <td style="padding:8px;"><span style="background:${statusColor}; color:white; padding:3px 8px; border-radius:12px; font-size:10px; font-weight:bold;">${sName}</span></td>
        </tr>`;
    // Προσθήκη της γραμμής του task με το στυλιζαρισμένο "pill" για το status.
  }
  return html + `</table></div>`;
  // Επιστροφή του πλήρους HTML κώδικα του πίνακα.
}


function confirmAi(tid, msg, mode) {
  const thread = rawData.find(t => String(t.id) === String(tid));
  if (!thread) return;

  const isTasks = (mode === 'tasks' || mode === 'recreate');
  let p = isTasks ? <?!= JSON.stringify(getTaskAssignmentPrompt()) ?> : currentGlobalPrompt;
  
  // 1. ΔΙΑΣΦΑΛΙΣΗ ΙΣΤΟΡΙΚΟΥ (Append αντί για Reset)
  if (!thread.chatHistory) thread.chatHistory = [];
  thread.chatHistory.push({ role: "user", parts: [{ text: msg }] });

  // Στοχεύουμε το κεντρικό input του sidebar
  const inputEl = document.getElementById('global-ai-input');
  if (inputEl) {
    inputEl.disabled = true;
    inputEl.placeholder = "Το AI σκέφτεται...";
  }

  google.script.run
    .withSuccessHandler(res => {
      if (inputEl) {
        inputEl.disabled = false;
        inputEl.placeholder = "Συζήτηση για ανάλυση ή tasks...";
        inputEl.value = ''; // Καθαρίζουμε το κουτί
      }
      
      // 2. ΠΡΟΣΘΗΚΗ ΑΠΑΝΤΗΣΗΣ ΣΤΟ ΙΣΤΟΡΙΚΟ (Όχι αντικατάσταση)
      thread.chatHistory.push({ role: "model", parts: [{ text: res.trim() }] });

      // 3. LOGIC ΓΙΑ BIGQUERY (Μόνο αν είναι Task Mode)
      if (isTasks) {
        try {
          let cleanRes = res.replace(/```json/g, "").replace(/```/g, "");
          let start = cleanRes.indexOf('{'), end = cleanRes.lastIndexOf('}');
          
          if (start !== -1 && end !== -1 && end > start) {
            let jsonString = cleanRes.substring(start, end + 1).replace(/\n/g, " ").replace(/\r/g, " ");
            const command = JSON.parse(jsonString);
            const entries = Array.isArray(command.entries) ? command.entries : [command];
            
            let taskPackage = []; 
            entries.forEach(entry => {
              let indices = Array.isArray(entry.msg_index) ? entry.msg_index : [entry.msg_index];
              indices.forEach(rawIdx => {
                let msgIdx = parseInt(rawIdx) - 1;
                if (thread.messages[msgIdx]) {
                  taskPackage.push({ msgId: thread.messages[msgIdx].id, entry: entry });
                }
              });
            });

            if (taskPackage.length > 0) {
              google.script.run
                .withSuccessHandler(logStatus => {
                  console.log("BQ Log:", logStatus);
                  refreshAllTasksInThread(tid); // Ανανέωση αριστερά στα mails
                  syncTasksOnly(tid, thread);   // Ανανέωση πάνω δεξιά (χωρίς flicker)
                })
                .aiAutomatedLoggerBatch(taskPackage, tid, thread.client, thread.consultant, mode === 'recreate');
            }
          }
        } catch (e) { console.error("JSON Error:", e); }
      }

      // 4. ΖΩΓΡΑΦΙΚΗ (Μόνο το Chat κομμάτι)
      renderChatUI(tid, true); 

    })
    .withFailureHandler(err => {
      if (inputEl) inputEl.disabled = false;
      alert("❌ AI ERROR: " + err.message);
    })
    .getAiChatResponse(tid, thread.chatHistory, p, null, mode === 'recreate');
}


function syncTasksOnly(tid, thread) {
  const mIds = thread.messages.map(m => m.id);
  google.script.run.withSuccessHandler(allTasksMap => {
    let allEntries = [];
    Object.values(allTasksMap).forEach(tasks => {
      tasks.forEach(t => {
        allEntries.push({ task_name: t.task, status_id: t.sId, msg_index: [1] });
      });
    });

    // Ενημέρωση Πίνακα
    const taskContainer = document.getElementById('side-tasks-container');
    if (taskContainer) {
      taskContainer.innerHTML = allEntries.length > 0 
        ? generateTaskSummaryTable(allEntries) 
        : "<p style='color:#888; font-size:12px; text-align:center; padding:10px; border:1px dashed #ccc;'>Δεν υπάρχουν ενεργά Tasks.</p>";
    }

    // Ενημέρωση Κουμπιών (Create ή Update)
    const actionsContainer = document.getElementById('task-actions');
    if (actionsContainer) {
      const btnLabel = allEntries.length > 0 ? "🔄 Update Tasks" : "🚀 Create Tasks";
      const btnColor = allEntries.length > 0 ? "var(--green)" : "var(--primary)";
      actionsContainer.innerHTML = `
        <button class="btn-main" style="flex:1; background:${btnColor}; margin:0; padding:10px; font-size:12px;" onclick="runAI('${tid}', 'tasks')">${btnLabel}</button>
        <button class="btn-action" style="background:var(--red); color:white; width:40px; height:38px; border:none; border-radius:8px;" onclick="confirmDeleteTasks('${tid}')">🗑️</button>
      `;
    }
  }).getBulkMailTaskQueue(mIds);
}

function copyJsonToClipboard(elementId) {
  const el = document.getElementById(elementId);
  if (!el) return;
  
  // Παίρνουμε το καθαρό κείμενο από το <pre>
  const textToCopy = el.innerText || el.textContent;
  
  navigator.clipboard.writeText(textToCopy).then(() => {
    // Μπορείς να βάλεις ένα απλό alert αν θες, ή να μην βγάζει τίποτα
    alert("✅ Το JSON αντιγράφηκε επιτυχώς!");
  }).catch(err => {
    console.error('Failed to copy: ', err);
    alert("❌ Αποτυχία αντιγραφής.");
  });
}

function renderChatUI(tid, isAppend = false) {
  const cleanTid = String(tid).trim();
  const thread = rawData.find(t => String(t.id).trim() === cleanTid);
  const globalChat = document.getElementById('global-ai-content');
  
  if (!thread) return;

  // ΕΔΩ ΕΙΝΑΙ Η ΔΙΟΡΘΩΣΗ: Αν δεν έχει ιστορικό, ζήτα το από τη BigQuery
  if (!isAppend && (thread.chatHistory === undefined || thread.chatHistory === null)) {
    globalChat.innerHTML = '<div style="padding:40px; text-align:center; color:#888;"><p>⏳ Ανάκτηση ανάλυσης από BigQuery...</p></div>';
    
    google.script.run
      .withSuccessHandler(history => {
        thread.chatHistory = history || []; // Γέμισε τη μνήμη
        renderChatUI(tid); // Ξανατρέξε για να σχεδιάσεις
      })
      .fetchChatHistoryFromBQ(cleanTid);
    return; // Σταμάτα εδώ μέχρι να έρθει η απάντηση
  }

  // Σχεδιασμός του Header (Πελάτης & Tasks)
  if (!isAppend) {
    globalChat.innerHTML = `
      <div id="side-header-fixed" style="padding:15px; border-bottom:1px solid var(--border); background:var(--bg-card); position:sticky; top:0; z-index:100;">
        <div style="font-size:14px; font-weight:bold; color:var(--primary); margin-bottom:10px;">🏠 ${thread.client}</div>
        <div id="side-tasks-container"><p style="color:#888; font-size:12px; text-align:center;">📊 Φόρτωση Tasks...</p></div>
        <div id="task-actions" style="display:flex; align-items:center; gap:8px; margin-top:10px;"></div>
      </div>
      <div id="side-chat-stream" style="padding:15px;"></div>`;

function initResizer() {
// Συνάρτηση που ενεργοποιεί τη διαχωριστική γραμμή ανάμεσα στις στήλες.

  const resizer = document.getElementById('dragMe');
  // Εντοπισμός της γραμμής που "τραβάει" ο χρήστης.

  if (!resizer) return;
  // Αν η γραμμή δεν υπάρχει (π.χ. πριν φορτώσουν τα δεδομένα), σταμάτα την εκτέλεση.
  
  const leftSide = resizer.previousElementSibling;
  // Η αριστερή πλευρά (Emails Column).

  const container = resizer.parentElement;
  // Το συνολικό πλαίσιο (Main Dashboard).

  let x = 0;
  let leftWidth = 0;
  // Αρχικοποίηση μεταβλητών για τη θέση του ποντικιού και το πλάτος.

  const mouseDownHandler = function (e) {
  // Όταν ο χρήστης πατήσει το κουμπί του ποντικιού πάνω στη γραμμή:

    x = e.clientX;
    // Κατάγραψε την τωρινή οριζόντια θέση του ποντικιού.

    leftWidth = leftSide.getBoundingClientRect().width;
    // Μέτρησε πόσο φαρδιά είναι η αριστερή στήλη εκείνη τη στιγμή.

    document.addEventListener('mousemove', mouseMoveHandler);
    document.addEventListener('mouseup', mouseUpHandler);
    // Ξεκίνα να παρακολουθείς την κίνηση του ποντικιού σε όλη την οθόνη.

    resizer.classList.add('resizing');
    // Πρόσθεσε κλάση CSS για οπτική ένδειξη (π.χ. αλλαγή χρώματος γραμμής).

    document.body.style.cursor = 'col-resize';
    // Άλλαξε το βελάκι του ποντικιού σε διπλό βέλος αυξομείωσης.
  };

  const mouseMoveHandler = function (e) {
  // Όταν ο χρήστης σέρνει το ποντίκι:

    const dx = e.clientX - x;
    // Υπολόγισε πόσα pixels μετακινήθηκε το ποντίκι από το αρχικό σημείο.

    const containerWidth = container.getBoundingClientRect().width;
    // Μάθε το συνολικό πλάτος της οθόνης.

    const newLeftWidth = ((leftWidth + dx) * 100) / containerWidth;
    // Μετάτρεψε το νέο πλάτος σε ποσοστό (%) επί της εκατό.
    
    if (newLeftWidth > 15 && newLeftWidth < 85) {
      leftSide.style.flex = `0 0 ${newLeftWidth}%`;
    }
    // Αν το πλάτος είναι λογικό (ούτε πολύ μικρό, ούτε πολύ μεγάλο), εφάρμοσέ το.
  };

  const mouseUpHandler = function () {
  // Όταν ο χρήστης αφήσει το κουμπί του ποντικιού:

    resizer.classList.remove('resizing');
    // Αφαίρεσε το εφέ κίνησης από τη γραμμή.

    document.body.style.cursor = 'default';
    // Επαναφορά του ποντικιού στο κανονικό βελάκι.

    document.removeEventListener('mousemove', mouseMoveHandler);
    document.removeEventListener('mouseup', mouseUpHandler);
    // Σταμάτα να παρακολουθείς την κίνηση.
  };

  resizer.addEventListener('mousedown', mouseDownHandler);
  // Σύνδεσε το πάτημα του ποντικιού με την έναρξη της διαδικασίας.
}

function bulkSaveToBQ() {
  const start = document.getElementById('singleDate').value;
  const end = document.getElementById('endDate').value || start;
  
  if (!start) { 
    alert("⚠️ Παρακαλώ επιλέξτε ημερομηνία έναρξης!"); 
    return; 
  }
  
  const btn = document.getElementById('btn-bulk-save');
  const originalText = btn.innerHTML;
  
  // Κλείδωμα κουμπιού και οπτική ένδειξη
  btn.disabled = true;
  btn.innerHTML = "⏳ Προετοιμασία...";
  btn.style.opacity = "0.7";

  // Ξεκινάει το interval που ρωτάει το backend "πού βρισκόμαστε;"
  const progressInterval = setInterval(() => {
    google.script.run.withSuccessHandler(count => {
      if (btn.disabled) {
        btn.innerHTML = `⏳ Σώθηκαν: ${count} mails...`;
      }
    }).getImportProgress();
  }, 1000);

  // Κυρίως κλήση στον Server (Proxy)
  google.script.run
    .withSuccessHandler(total => {
      clearInterval(progressInterval); // Σταματάμε το "ρολόι"
      btn.innerHTML = originalText;
      btn.disabled = false;
      btn.style.opacity = "1";
      alert(`✅ Η αποθήκευση ολοκληρώθηκε!\n\nΣυνολικά προστέθηκαν ${total} νέα μηνύματα.`);
    })
    .withFailureHandler(err => {
      clearInterval(progressInterval);
      btn.innerHTML = originalText;
      btn.disabled = false;
      btn.style.opacity = "1";
      alert("❌ Σφάλμα συστήματος: " + err);
    })
    .bulkSaveActionProxy(start, end); // Στέλνουμε τις δύο ημερομηνίες
}

function copyMailId() {
  pendingMessageId = String(currentActiveId).trim();
  pendingMessageObj = null;

  // Βρίσκουμε το mail μέσα στο rawData!
  for (let i = 0; i < rawData.length; i++) {
    if (!rawData[i].messages) continue;
    const msg = rawData[i].messages.find(m => String(m.id) === pendingMessageId);
    if (msg) {
      pendingMessageObj = JSON.parse(JSON.stringify(msg)); 
      break;
    }
  }

  if (!pendingMessageObj) {
    alert("⚠️ Σφάλμα: Δεν μπόρεσα να διαβάσω το Mail από τη μνήμη. Κάντε μια 'Αναφορά' και ξαναδοκιμάστε.");
    return;
  }

  alert("✅ Αντιγράφηκε! Τώρα κάντε δεξί κλικ στον τίτλο ενός άλλου Thread και πατήστε 'Σύνδεση'.");
}

function pasteToThread() {
  if (!pendingMessageId || !pendingMessageObj) {
    alert("⚠️ Δεν έχει επιλεγεί Mail! Κάνε πρώτα 'Αντιγραφή για σύνδεση' πάνω στο mail που θέλεις.");
    return;
  }

  const targetThreadId = String(currentActiveId).trim();
  const sourceMailId = pendingMessageId;

  // 1. Optimistic UI: Ζωγραφίζει το mail ακαριαία
  const targetThread = rawData.find(t => String(t.id) === targetThreadId);
  if (targetThread) {
    if (!targetThread.messages.some(m => String(m.id) === sourceMailId)) {
      targetThread.messages.push(pendingMessageObj);
      targetThread.messages.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
      
      applyGlobal(); 
      setTimeout(() => {
        const det = document.getElementById(`t-${targetThreadId}`);
        if (det) det.open = true;
      }, 100);
    }
  }

  // 2. Ενημέρωση Βάσης
  google.script.run
    .withSuccessHandler(res => {
      alert(res); 
      pendingMessageId = null;
      pendingMessageObj = null;
    })
    .withFailureHandler(err => alert("❌ Σφάλμα Βάσης: " + err))
    .linkEmailToThread(sourceMailId, targetThreadId);
}

function removeFromThread() {
  const sourceMailId = String(currentActiveId).trim(); 
  if (!sourceMailId) return alert("⚠️ Σφάλμα: Δεν βρέθηκε το ID του μηνύματος.");

  let targetThreadId = null;
  let targetThread = null;
  let msgIndex = -1;

  for (let i = 0; i < rawData.length; i++) {
    if (!rawData[i].messages) continue;
    const index = rawData[i].messages.findIndex(m => String(m.id) === sourceMailId);
    if (index !== -1) {
      targetThreadId = rawData[i].id;
      targetThread = rawData[i];
      msgIndex = index;
      break;
    }
  }

  // 1. Optimistic UI: Ακαριαία αφαίρεση
  if (targetThreadId && msgIndex !== -1) {
     targetThread.messages.splice(msgIndex, 1);
     applyGlobal(); 
     
     setTimeout(() => {
        const det = document.getElementById(`t-${targetThreadId}`);
        if (det && targetThread.messages.length > 0) det.open = true;
      }, 100);
  }

  // 2. Ενημέρωση Βάσης
  google.script.run
    .withSuccessHandler(res => {
      alert(res);
      if (pendingMessageId === sourceMailId) {
        pendingMessageId = null; 
        pendingMessageObj = null;
      }
    })
    .withFailureHandler(err => alert("❌ Σφάλμα Βάσης: " + err))
    .unlinkEmailFromThread(sourceMailId, targetThreadId);
}

}


function refreshAllTasksInThread(tid) {
// Συνάρτηση που ανανεώνει τα task grids όλων των μηνυμάτων ενός thread.

  const thread = rawData.find(t => String(t.id) === String(tid));
  // Εντοπισμός του thread στο rawData χρησιμοποιώντας αυστηρή σύγκριση String για τα IDs.

  if (!thread || !thread.messages) return;
  // Αν το thread δεν βρεθεί ή δεν έχει μηνύματα, σταμάτα για να αποφευχθεί σφάλμα.
  
  const mIds = thread.messages.map(m => m.id);
  // Δημιουργία μιας λίστας με όλα τα IDs των μηνυμάτων του thread.

  google.script.run.withSuccessHandler(allTasksMap => {
  // Κάλεσε τον server (BigQuery) για να φέρει ΟΛΑ τα tasks για αυτά τα μηνύματα με ΜΙΑ κλήση (Bulk).

    mIds.forEach(mId => {
    // Για κάθε ID μηνύματος που επιστράφηκε:

      const container = document.getElementById(`grid-${mId}`);
      // Βρες το div-κοντέινερ (grid) που βρίσκεται κάτω από το συγκεκριμένο mail στο UI.

      if (container) {
        const tasksForThisMessage = allTasksMap[mId] || [];
        renderTaskHtml(container, tasksForThisMessage);
      }
      // Αν το κοντέινερ υπάρχει, κάλεσε τη renderTaskHtml για να "ζωγραφίσει" τα νέα δεδομένα.
    });
  }).getBulkMailTaskQueue(mIds);
  // Εκτέλεση της server-side συνάρτησης που φέρνει τα δεδομένα από τη BigQuery.
}
function triggerReanalyze() {
  const openDetail = document.querySelector('.emails-column details[open]');
  if (!openDetail) {
    alert("Παρακαλώ ανοίξτε μια συνομιλία αριστερά.");
    return;
  }
  const tid = openDetail.id.replace('t-', '');

  const isConfirmed = confirm("⚠️ Προσοχή: Θα διαγραφούν οι υπάρχουσες αναλύσεις του AI για αυτό το thread και θα παραχθούν νέες. Συμφωνείτε;");
  if (!isConfirmed) return;

  // Καλούμε το AI απευθείας, περνώντας του την εντολή 'recreate'
  runAI(tid, 'recreate'); 
}
